<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SiVA Italia — Accesso Riservato</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#F5F7F9;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;min-height:100vh;position:relative}
body::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,152,168,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,152,168,0.04) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}
.box{background:#fff;border:1px solid #E5E9ED;border-top:3px solid #0098A8;padding:3rem 2.5rem;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.08);position:relative;z-index:1;animation:fi 0.5s ease}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.logo-wrap{text-align:center;margin-bottom:2rem}
.logo-inner{display:inline-flex;align-items:center;justify-content:center;background:#1A1A2A;padding:10px 18px;margin-bottom:1rem}
.ls{font-size:1.8rem;font-weight:900;color:#fff;line-height:1}
.li{font-size:1.4rem;font-weight:400;color:#0098A8;line-height:1}
.lva{font-size:1.8rem;font-weight:900;color:#0098A8;line-height:1}
.lsq{width:8px;height:8px;background:#D4271C;margin-bottom:14px;margin-left:2px;vertical-align:bottom;display:inline-block}
.sub{font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#9CA3AF}
.ttl{font-size:1.1rem;font-weight:700;color:#1A1A2A;margin-bottom:.3rem;text-align:center}
.dsc{font-size:.8rem;color:#9CA3AF;text-align:center;margin-bottom:2rem;line-height:1.6}
label{display:block;font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#9CA3AF;margin-bottom:.4rem}
.pw{position:relative}
input{width:100%;padding:.85rem 3rem .85rem 1rem;border:1px solid #E5E9ED;border-radius:2px;font-size:.9rem;color:#1A1A2A;outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s;background:#fff}
input:focus{border-color:#0098A8;box-shadow:0 0 0 3px rgba(0,152,168,.07)}
.eye{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:.2rem;color:#9CA3AF;transition:color .2s}
.eye:hover{color:#0098A8}
.eye svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.5}
.btn{width:100%;background:#0098A8;color:#fff;border:none;padding:.9rem;font-family:inherit;font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;margin-top:1.2rem;transition:background .2s,transform .2s;box-shadow:0 4px 16px rgba(0,152,168,.3)}
.btn:hover{background:#00B4C6;transform:translateY(-1px)}
.err{display:none;margin-top:.8rem;padding:.7rem 1rem;background:rgba(212,39,28,.07);border:1px solid rgba(212,39,28,.15);border-radius:2px;font-size:.8rem;color:#D4271C;text-align:center;animation:sk .4s ease}
@keyframes sk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.err.show{display:block}
.att{font-size:.68rem;color:#9CA3AF;text-align:center;margin-top:.8rem;display:none}
.ft{margin-top:2rem;padding-top:1.5rem;border-top:1px solid #E5E9ED;text-align:center;font-size:.7rem;color:#9CA3AF;line-height:1.6}
.ft strong{color:#1A1A2A}
</style>
</head>
<body>
<div class="box">
  <div class="logo-wrap">
    <div class="logo-inner">
      <span class="ls">S</span><span class="li">i</span><span class="lva">VA</span><span class="lsq"></span>
    </div>
    <div class="sub">Industria Grafica</div>
  </div>
  <div class="ttl">Accesso Riservato</div>
  <p class="dsc">Questo sito è protetto.<br>Inserisci la password per visualizzare il contenuto.</p>
  <label for="p">Password</label>
  <div class="pw">
    <input type="password" id="p" placeholder="••••••••••••" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="eye" id="ey" type="button">
      <svg viewBox="0 0 24 24" id="ei"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <div class="err" id="er">❌ Password errata. Riprova.</div>
  <div class="att" id="at"></div>
  <button class="btn" id="bn" type="button">Accedi →</button>
  <div class="ft"><strong>SiVA Italia srl</strong><br>Via Egitto 26 — Montesilvano (Pescara)<br>Anteprima riservata — non distribuire</div>
</div>
<script>
const H='cb5939eadf2fac424b6184f1636a2adfb7be438094f85a2eae68021bb1f75e09';
async function h(m){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
let att=0;const MAX=5;
async function go(){
  const v=document.getElementById('p').value;if(!v)return;
  const bn=document.getElementById('bn');bn.textContent='Verifica...';bn.disabled=true;
  if(await h(v)===H){
    bn.textContent='✓ Accesso consentito';bn.style.background='#2a7a4e';
    setTimeout(()=>{window.location.href='index.html'},600);
  } else {
    att++;
    const er=document.getElementById('er'),at=document.getElementById('at');
    er.classList.add('show');document.getElementById('p').value='';
    bn.textContent='Accedi →';bn.disabled=false;
    if(att>=2){at.style.display='block';at.textContent='Tentativi rimanenti: '+(MAX-att)}
    if(att>=MAX){bn.disabled=true;bn.textContent='Bloccato';bn.style.background='#D4271C';at.textContent='Troppi tentativi. Ricarica la pagina.';setTimeout(()=>location.reload(),5000)}
  }
}
document.getElementById('bn').addEventListener('click',go);
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')go()});
document.getElementById('ey').addEventListener('click',function(){
  const i=document.getElementById('p'),h=i.type==='password';
  i.type=h?'text':'password';
  document.getElementById('ei').innerHTML=h
    ?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
});
</script>
</body>
</html>
